name: Deploy to Alwaysdata

on:
  push:
    branches:
      - main  # Le déploiement se lance quand vous pushez sur main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout du code
        uses: actions/checkout@v4

      - name: 🚀 Déploiement via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ftp-yeadonaye.alwaysdata.net
          username: ${{ secrets.AD_USER }}
          password: ${{ secrets.AD_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          # Sur Alwaysdata, le dossier web par défaut est /www/
          server-dir: /www/
          # Optionnel : supprime les fichiers sur le serveur qui ne sont plus dans le repo
          dangerous-clean-slate: false

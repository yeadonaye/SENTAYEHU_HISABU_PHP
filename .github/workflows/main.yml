name: Deploy to Alwaysdata

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout du code
        uses: actions/checkout@v4 # Version plus récente

      - name: 🚀 Déploiement via FTPS (Sécurisé)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp-yeadonaye.alwaysdata.net
          username: ${{ secrets.AD_USER }}
          password: ${{ secrets.AD_PASSWORD }}
          protocol: ftps           # <--- On change ftp par ftps
          port: 21
          local-dir: ./
          server-dir: /www/        # <--- Vérifiez bien ce dossier chez Alwaysdata
          # Cette option est souvent nécessaire pour le FTPS sur GitHub Actions
          security: loose
